davinci_arm_gui_node:
  ros__parameters:
    joints:
      names:
        - shoulder_link_joint
        - bicep_link_joint
        - arm_link_joint
        - wrist_link_joint
        - end_effector_link_joint

    topic_ns:
      real: "/davinci_arm/real"
      sim: "/davinci_arm"

    topics:
      telemetry:
        real_joint_states: "/davinci_arm/real/joint_states"
        sim_joint_states: "/joint_states"
        controller_state: "/davinci_arm_controller/controller_state"
        planning_scene: "/planning_scene"
        display_planned_path: "/display_planned_path"
        trajectory_execution_event: "/trajectory_execution_event"

      commands:
        ref_angle: "ref_angle_rad"
        pwm_cmd: "esc/pwm_us"
        auto_mode: "esc/auto_mode"

        per_joint:
          sim:
            shoulder_link_joint: "/davinci_arm/shoulder_cmd_pos"
            bicep_link_joint: "/davinci_arm/bicep_cmd_pos"
            arm_link_joint: "/davinci_arm/arm_cmd_pos"
            wrist_link_joint: "/davinci_arm/wrist_cmd_pos"
            end_effector_link_joint: "/davinci_arm/end_effector_cmd_pos"

          real:
            shoulder_link_joint: "/davinci_arm/real/shoulder_cmd_pos"
            bicep_link_joint: "/davinci_arm/real/bicep_cmd_pos"
            arm_link_joint: "/davinci_arm/real/arm_cmd_pos"
            wrist_link_joint: "/davinci_arm/real/wrist_cmd_pos"
            end_effector_link_joint: "/davinci_arm/real/end_effector_cmd_pos"

      signals:
        angle: "angle_rad"
        motor_speed: "motor_vel_rad"
        pwm_feedback: "esc/pwm_us_fb"
        angle_ref: "ref_angle_rad"
